<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Xưởng May</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,800;1,9..144,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f1ea;--bg-e:#fff;--bg-s:#ebe5d9;
  --ink:#1a1a1a;--ink-s:#4a4a4a;--ink-m:#8a8378;
  --ln:#d9d2c2;--ln-s:#e8e2d3;
  --acc:#c84630;--acc-s:#f0dbd7;
  --gld:#b8923f;--gld-s:#f4e9d3;
  --grn:#3d6b37;--grn-s:#d4e6d0;
  --blu:#2b5fa0;--blu-s:#d4e2f4;
  --wrn:#c8861f;--wrn-s:#f4e6cd;
  --dan:#b33a2a;
  --r:12px;--rs:8px;--rl:18px;
  --sh:0 1px 3px rgba(26,26,26,.06),0 0 0 1px rgba(26,26,26,.04);
  --shm:0 4px 12px rgba(26,26,26,.08),0 0 0 1px rgba(26,26,26,.04);
  --fd:'Fraunces',Georgia,serif;--fb:'DM Sans',-apple-system,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--fb);background:var(--bg);color:var(--ink);line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased;font-size:14px;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}

.app{max-width:1200px;margin:0 auto;padding-bottom:100px}

/* HEADER */
.hdr{padding:11px 14px 8px;border-bottom:1px solid var(--ln);position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);background:rgba(245,241,234,.95)}
.brand{display:flex;align-items:baseline;justify-content:space-between;max-height:38px;margin-bottom:7px;overflow:hidden;transition:max-height .25s,opacity .2s,margin .2s}
@media(max-width:640px){.hdr.sc{padding-top:5px;padding-bottom:5px}.hdr.sc .brand{max-height:0;opacity:0;margin-bottom:0}}
.b-name{font-family:var(--fd);font-weight:800;font-size:19px;letter-spacing:-.02em}
.b-name em{font-style:italic;font-weight:300;color:var(--acc)}
.b-tag{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-m)}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}
.tab{padding:6px 3px;font-size:10.5px;font-weight:600;border-radius:var(--rs);color:var(--ink-s);text-align:center;line-height:1.3;transition:all .15s}
.tab .ti{font-size:13px;display:block;margin-bottom:1px}
.tab:hover{background:var(--bg-s)}.tab.active{background:var(--ink);color:var(--bg)}
@media(min-width:640px){.tabs{display:flex;gap:4px}.tab{flex:0 0 auto;padding:8px 14px;font-size:13px;display:flex;align-items:center;gap:4px}.tab .ti{display:inline;font-size:12px;margin-bottom:0}}

/* MAIN */
main{padding:13px 14px}
@media(min-width:640px){main{padding:18px 22px}}
.page-title{font-family:var(--fd);font-size:22px;font-weight:600;letter-spacing:-.02em;margin-bottom:2px}
@media(min-width:640px){.page-title{font-size:28px}}
.page-sub{color:var(--ink-m);font-size:12px;margin-bottom:14px}

/* STAT */
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
@media(min-width:640px){.sg{grid-template-columns:repeat(4,1fr);gap:12px}}
.sg3{grid-template-columns:repeat(3,1fr)!important}
@media(max-width:400px){.sg3{grid-template-columns:repeat(2,1fr)!important}}
.st{background:var(--bg-e);border-radius:var(--r);padding:11px 12px;border:1px solid var(--ln-s);position:relative;overflow:hidden;box-shadow:var(--sh)}
.st::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:var(--ac,var(--ink))}
.st[data-t=c]{--ac:var(--blu)}.st[data-t=s]{--ac:var(--grn)}.st[data-t=r]{--ac:var(--gld)}.st[data-t=x]{--ac:var(--acc)}.st[data-t=k]{--ac:var(--ink-s)}.st[data-t=o]{--ac:var(--grn)}
.st-l{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-m);font-weight:600;margin-bottom:2px}
.st-v{font-size:18px;font-weight:700;letter-spacing:-.02em;line-height:1.1;font-variant-numeric:tabular-nums}
@media(min-width:640px){.st-v{font-size:22px}}
.st-s{font-size:10px;color:var(--ink-m);margin-top:2px}

/* FORM */
.fg{display:grid;gap:9px}
.fg1{grid-template-columns:1fr}
.fg2{grid-template-columns:1fr 1fr}
.fg3{grid-template-columns:1fr 1fr 1fr}
.fg4{grid-template-columns:repeat(4,1fr)}
@media(max-width:639px){.fg3{grid-template-columns:1fr 1fr}.fg4{grid-template-columns:1fr 1fr}}
.fld{display:flex;flex-direction:column;gap:3px}
.fld label{font-size:10px;font-weight:700;color:var(--ink-s);text-transform:uppercase;letter-spacing:.05em}
.inp,.sel{width:100%;padding:9px 10px;background:var(--bg);border:1.5px solid var(--ln);border-radius:var(--rs);font-size:13px;transition:border .15s,box-shadow .15s}
.inp:focus,.sel:focus{outline:none;border-color:var(--ink);box-shadow:0 0 0 3px rgba(26,26,26,.08);background:var(--bg-e)}
.inp.err{border-color:var(--dan)}
.hint{font-size:10px;color:var(--ink-m)}

/* BTN */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 14px;border-radius:var(--rs);font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap}
.bp{background:var(--ink);color:var(--bg)}.bp:hover{background:#000;transform:translateY(-1px);box-shadow:var(--shm)}
.bs{background:var(--bg-s);color:var(--ink);border:1.5px solid var(--ln)}.bs:hover{background:var(--ln-s)}
.bd{background:transparent;color:var(--dan);border:1.5px solid var(--acc-s)}.bd:hover{background:var(--acc-s)}
.bg{color:var(--ink-s);padding:6px 8px}.bg:hover{background:var(--bg-s)}
.bsm{padding:5px 10px;font-size:12px}.bxs{padding:3px 7px;font-size:11px}
.bblk{width:100%}
.bgrn{background:var(--grn);color:#fff}.bgrn:hover{filter:brightness(1.1)}

/* TABLE */
.tw{background:var(--bg-e);border-radius:var(--r);border:1px solid var(--ln-s);overflow:hidden;box-shadow:var(--sh)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:7px 11px;font-size:9.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-m);font-weight:600;border-bottom:1px solid var(--ln);background:var(--bg-s);white-space:nowrap}
.tbl td{padding:8px 11px;border-bottom:1px solid var(--ln-s);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg-s)}
.tbl tr.deleted td{opacity:.5;text-decoration:line-through;color:var(--ink-m)}
.tbl tr.deleted{background:repeating-linear-gradient(45deg,transparent,transparent 6px,rgba(180,60,40,.04) 6px,rgba(180,60,40,.04) 12px)}
.num{font-variant-numeric:tabular-nums;font-weight:600}
.mon{font-variant-numeric:tabular-nums;font-weight:700;color:var(--grn)}
.cst{font-variant-numeric:tabular-nums;font-weight:700;color:var(--acc)}
@media(max-width:640px){
  .tw{background:transparent;border:none;box-shadow:none}
  .tbl thead{display:none}
  .tbl,.tbl tbody,.tbl tr,.tbl td{display:block;width:100%}
  .tbl tr{background:var(--bg-e);border:1px solid var(--ln-s);border-radius:var(--r);padding:10px 12px;margin-bottom:8px;box-shadow:var(--sh)}
  .tbl tr:hover td{background:transparent}
  .tbl tr.deleted td{text-decoration:line-through}
  .tbl td{padding:3px 0;border:none;display:flex;justify-content:space-between;align-items:center;gap:6px;font-size:12px}
  .tbl td::before{content:attr(data-l);font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-m);font-weight:600;flex-shrink:0}
  .tn{font-size:13px;font-weight:700}.tn::before{display:none}
  .ta{justify-content:flex-end;padding-top:7px;margin-top:4px;border-top:1px dashed var(--ln-s)}.ta::before{display:none}
}

/* BADGE */
.bdg{display:inline-flex;align-items:center;padding:2px 7px;border-radius:999px;font-size:10px;font-weight:600}
.bb{background:var(--blu-s);color:var(--blu)}.bg2{background:var(--grn-s);color:var(--grn)}
.bgo{background:var(--gld-s);color:var(--gld)}.br{background:var(--acc-s);color:var(--dan)}
.bgr{background:var(--bg-s);color:var(--ink-s);border:1px solid var(--ln)}.bw{background:var(--wrn-s);color:var(--wrn)}

/* SUB-TAB */
.stabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.stab{padding:5px 12px;font-size:12px;font-weight:600;border-radius:999px;color:var(--ink-s);border:1.5px solid var(--ln);background:var(--bg-e);transition:all .15s}
.stab:hover{background:var(--bg-s)}.stab.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}

/* SECTION */
.sec{margin-bottom:16px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;gap:8px;flex-wrap:wrap}
.st2{font-family:var(--fd);font-size:15px;font-weight:600;letter-spacing:-.01em}
@media(min-width:640px){.st2{font-size:18px}}

/* INLINE FORM */
.iform{background:var(--bg-e);border-radius:var(--r);border:1.5px solid var(--ln-s);padding:13px;box-shadow:var(--sh);margin-bottom:16px}
.iform-t{font-family:var(--fd);font-size:14px;font-weight:600;margin-bottom:11px;display:flex;align-items:center;justify-content:space-between}

/* FILTER BAR */
.fb{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.fb .inp,.fb .sel{flex:1;min-width:95px}
.cdate{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.cdate .fld{flex:1;min-width:120px}

/* COST CATEGORY CHIPS */
.cat-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.cchip{padding:6px 12px;font-size:12px;font-weight:600;border-radius:999px;border:1.5px solid var(--ln);background:var(--bg-e);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.cchip:hover{border-color:var(--ink-s);background:var(--bg-s)}
.cchip.on{border-color:var(--ink);background:var(--ink);color:var(--bg)}
.cchip .cchip-count{font-size:10px;font-weight:700;opacity:.7}

/* COST STATS CHIPS */
.cs-chips{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
@media(min-width:480px){.cs-chips{grid-template-columns:repeat(4,1fr)}}
@media(min-width:720px){.cs-chips{grid-template-columns:repeat(6,1fr)}}
.cs-chip{background:var(--bg-e);border:1.5px solid var(--ln-s);border-radius:var(--rs);padding:6px 7px;cursor:pointer;transition:all .15s;box-shadow:var(--sh)}
.cs-chip:hover{border-color:var(--ink-s);box-shadow:var(--shm)}
.cs-chip.on{border-color:var(--ink);box-shadow:0 0 0 2px rgba(26,26,26,.12)}
.cs-chip-name{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-m);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cs-chip-val{font-size:12.5px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--acc);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cs-chip-cnt{font-size:9px;color:var(--ink-m);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cs-total{background:var(--ink);border-radius:var(--r);padding:10px 12px;color:var(--bg);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.cs-total-l{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;opacity:.7}
.cs-total-v{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums}

/* CART (giỏ nhập tạm) */
.cart{background:var(--bg-e);border-radius:var(--r);border:1.5px solid var(--grn);padding:12px;margin-bottom:14px;box-shadow:var(--sh)}
.cart-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--grn);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.cart-row{display:grid;grid-template-columns:1fr auto auto auto;gap:7px;align-items:center;padding:7px 0;border-bottom:1px solid var(--ln-s)}
.cart-row:last-child{border-bottom:none}
@media(max-width:540px){.cart-row{grid-template-columns:1fr 1fr;gap:6px;background:var(--bg-s);border-radius:var(--rs);padding:8px;margin-bottom:6px;border-bottom:none;align-items:center}}
.cart-info{font-size:13px;font-weight:600}
.cart-info .ci-sub{font-size:11px;font-weight:400;color:var(--ink-m)}
.cart-qty{display:flex;align-items:center;gap:5px}
.cart-qty input{width:70px;padding:5px 7px;font-size:13px;border:1.5px solid var(--ln);border-radius:var(--rs);text-align:center;background:var(--bg)}
.cart-qty input:focus{outline:none;border-color:var(--ink)}

/* HISTORY ITEM */
.hi{background:var(--bg-e);border:1px solid var(--ln-s);border-radius:var(--r);padding:10px 12px;margin-bottom:7px;box-shadow:var(--sh)}
.hi.deleted{opacity:.65;border-style:dashed;border-color:var(--acc-s);background:rgba(240,219,215,.3);border-left:3px solid var(--dan)}
.hi-head{display:flex;justify-content:space-between;align-items:flex-start;gap:7px;margin-bottom:4px}
.hi-name{font-weight:700;font-size:13px}
.hi-date{font-size:10.5px;color:var(--ink-m)}
.hi-acts{display:flex;gap:4px;margin-top:7px;justify-content:flex-end}
.deleted-label{display:inline-flex;align-items:center;gap:4px;background:var(--acc-s);color:var(--dan);font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px}

/* PAGER */
.pager{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:4px;margin:12px 0 4px}
.pgbtn{min-width:28px;height:28px;padding:0 8px;border-radius:var(--rs);border:1px solid var(--ln);background:var(--bg-e);color:var(--ink-s);font-size:11.5px;font-weight:600;cursor:pointer}
.pgbtn.on{background:var(--ink);color:var(--bg-e);border-color:var(--ink)}
.pgbtn:disabled{opacity:.4;cursor:default}
.pgdots{padding:0 3px;color:var(--ink-m);font-size:11.5px}
.pg-count{width:100%;text-align:center;font-size:10.5px;color:var(--ink-m);margin-bottom:2px}

/* SIZE PICKER */
.size-pick-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.spick{padding:5px 11px;font-size:12px;font-weight:600;border-radius:999px;border:1.5px solid var(--ln);background:var(--bg-s);cursor:pointer;transition:all .15s}
.spick.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.spick.warn{border-color:var(--wrn);color:var(--wrn)}
.sr-row{display:grid;grid-template-columns:auto 1fr auto auto;gap:7px;align-items:center;background:var(--bg-s);padding:7px 9px;border-radius:var(--rs);border:1px solid var(--ln-s);margin-bottom:5px}
.sr-lbl{font-size:11px;font-weight:700;background:var(--ink);color:var(--bg);padding:2px 9px;border-radius:999px;white-space:nowrap}
.sr-avail{font-size:10px;color:var(--ink-m);white-space:nowrap}
.sr-row .inp{padding:6px 8px;font-size:12px}

/* CHIP */
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;background:var(--bg-s);border-radius:999px;font-size:11px;border:1px solid var(--ln);font-weight:600}
.chip-x{color:var(--ink-m);cursor:pointer;font-size:13px;line-height:1}.chip-x:hover{color:var(--dan)}

/* PROGRESS */
.pw{background:var(--bg-s);border-radius:999px;height:4px;overflow:hidden;margin-top:3px}
.pb{height:100%;border-radius:999px;background:var(--grn)}
.pb.bl{background:var(--blu)}

/* COMPACT STAT CARD (mobile-first grid cards, thay cho bảng dài) */
.cct-list{display:flex;flex-direction:column;gap:6px}
.cct{background:var(--bg-e);border:1px solid var(--ln-s);border-radius:var(--rs);padding:8px 10px;box-shadow:var(--sh)}
.cct-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px}
.cct-name{font-weight:700;font-size:12.5px;display:flex;align-items:center;gap:5px;min-width:0}
.cct-name .tn2{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cct-avg{font-size:13px;font-weight:700;white-space:nowrap}
.cct-mets{display:flex;gap:10px;font-size:10.5px;color:var(--ink-m);flex-wrap:wrap}
.cct-mets b{color:var(--ink-s)}
.cct-prog{display:flex;align-items:center;gap:8px;margin-top:5px}
.cct-prog .pw{flex:1;margin-top:0;height:6px}
.cct-prog .pct{font-size:11px;font-weight:700;white-space:nowrap;min-width:32px;text-align:right}

/* TOAST */
#TR{position:fixed;top:13px;left:50%;transform:translateX(-50%);z-index:200;pointer-events:none}
.toast{background:var(--ink);color:var(--bg);padding:9px 16px;border-radius:999px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.18);animation:tIn .2s ease;white-space:nowrap}
.toast.e{background:var(--dan)}
@keyframes tIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* UTIL */
.mt8{margin-top:8px}.mt12{margin-top:12px}
.mu{color:var(--ink-m)}.tg{color:var(--grn);font-weight:600}.tr{color:var(--dan);font-weight:600}.tgo{color:var(--gld);font-weight:600}.tb{color:var(--blu);font-weight:600}
.empty{text-align:center;padding:28px 16px;color:var(--ink-m);font-size:13px}
.ei{font-size:28px;margin-bottom:5px}
.divider{border:none;border-top:1px solid var(--ln-s);margin:11px 0}

/* LOGIN */
#LOGIN{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.login-box{width:100%;max-width:340px;background:var(--bg-e);border:1px solid var(--ln-s);border-radius:var(--rl);padding:28px 24px;box-shadow:var(--shm);text-align:center}
.login-box .b-name{font-family:var(--fd);font-weight:800;font-size:24px;letter-spacing:-.02em;margin-bottom:2px}
.login-box .b-tag{font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-m);margin-bottom:20px}
.login-err{font-size:11.5px;color:var(--dan);background:var(--acc-s);border-radius:var(--rs);padding:7px 10px;margin-bottom:10px;display:none;text-align:left}
.login-note{font-size:10.5px;color:var(--ink-m);margin-top:14px;line-height:1.5}
</style>
</head>
<body>
<div id="LOGIN" style="display:none">
  <div class="login-box">
    <div class="b-name">Xưởng <em>May</em></div>
    <div class="b-tag">Đăng nhập để tiếp tục</div>
    <div class="login-err" id="login_err"></div>
    <form id="login_form" class="fg fg1">
      <div class="fld" style="text-align:left">
        <label>Mật khẩu</label>
        <input class="inp" id="login_pw" type="password" autocomplete="current-password" required placeholder="Nhập mật khẩu">
      </div>
      <button class="btn bp bblk" id="login_btn" type="submit" style="margin-top:4px">Đăng nhập</button>
    </form>
    <div class="login-note">Dữ liệu đồng bộ qua Firebase. Mật khẩu do Firebase xác thực phía máy chủ, không lưu sẵn trong mã nguồn trang.</div>
  </div>
</div>
<div class="app" id="APP">
  <header class="hdr" id="HDR">
    <div class="brand">
      <div class="b-name">Xưởng <em>May</em></div>
      <div class="b-tag">Quản lý sản xuất</div>
    </div>
    <nav class="tabs">
      <button class="tab active" data-tab="ov"><span class="ti">📊</span>Tổng quan</button>
      <button class="tab" data-tab="pr"><span class="ti">👕</span>Sản phẩm</button>
      <button class="tab" data-tab="pd"><span class="ti">✂️</span>Cắt·May·Kho</button>
      <button class="tab" data-tab="cs"><span class="ti">💰</span>Chi phí</button>
    </nav>
    <div style="display:flex;gap:5px;margin-top:6px;justify-content:flex-end">
      <button id="btn_export" style="font-size:10px;font-weight:600;padding:3px 9px;border-radius:999px;background:var(--bg-s);color:var(--ink-m);border:1px solid var(--ln);cursor:pointer">💾 Backup</button>

function inR(d,f,t){if(!f&&!t)return true;if(!d)return false;const ds=d.slice(0,10);if(f&&ds<f)return false;if(t&&ds>t)return false;return true}
function mR(o=0){const n=new Date(),y=n.getFullYear(),m=n.getMonth()+o;return[new Date(y,m,1).toISOString().slice(0,10),new Date(y,m+1,0).toISOString().slice(0,10)]}
function wR(o=0){const n=new Date(),dy=n.getDay()||7,mn=new Date(n);mn.setDate(n.getDate()-dy+1+o*7);const su=new Date(mn);su.setDate(mn.getDate()+6);return[mn.toISOString().slice(0,10),su.toISOString().slice(0,10)]}
function gRange(f){let fr=f.from||'',to=f.to||'';if(f.period==='week')[fr,to]=wR();else if(f.period==='month')[fr,to]=mR();else if(f.period==='lastmonth')[fr,to]=mR(-1);return[fr,to]}

/* ================================================================
   FIFO ALLOCATION: Tính thời gian cắt→may theo FIFO
   Per product+size, cắt sớm nhất được may trước
   Returns: [{cutId, cutDate, sewnDate, qty, days}]
   ================================================================ */
function computeFIFO(productId, size){
  // Lấy tất cả lô cắt (chưa xoá) của SP+size, sort by date ASC
  const cuts = S.cutEntries
    .filter(c=>!c.deleted && c.productId===productId && (c.size||'')===(size||''))
    .map(c=>({id:c.id, date:c.date, qty:c.quantity, remaining:c.quantity}))
    .sort((a,b)=>a.date>b.date?1:-1);

  // Lấy tất cả lô may (chưa xoá) của SP+size, sort by date ASC
  const sewns = S.sewnEntries
    .filter(c=>!c.deleted && c.productId===productId && (c.size||'')===(size||''))
    .sort((a,b)=>a.date>b.date?1:-1);

  const allocs=[]; // {cutId,cutDate,sewnId,sewnDate,qty,days}
  // Clone remaining
  const rem=cuts.map(c=>({...c}));

  for(const swn of sewns){
    let need=swn.quantity;
    for(const r of rem){
      if(need<=0)break;
      if(r.remaining<=0)continue;
      const take=Math.min(r.remaining,need);
      allocs.push({cutId:r.id,cutDate:r.date,sewnId:swn.id,sewnDate:swn.date,qty:take,days:daysBetween(r.date,swn.date)});
      r.remaining-=take;
      need-=take;
    }
  }
  return allocs;
}

// Tính average days theo SP+size, hoặc tất cả
function avgDays(productId=null, size=null){
  const pairs = productId
    ? [[productId, size]]
    : [...new Set(S.sewnEntries.filter(c=>!c.deleted).map(c=>c.productId+'|'+(c.size||'')))].map(k=>{const[p,s]=k.split('|');return[p,s]});

  let totalDays=0, totalQty=0;
  for(const [pid,sz] of pairs){
    const allocs=computeFIFO(pid,sz);
    for(const a of allocs){totalDays+=a.days*a.qty;totalQty+=a.qty}
  }
  return totalQty>0?Math.round(totalDays/totalQty):null;
}

/* ================================================================
   Tính tồn kho khả dụng (chưa xoá)
   ================================================================ */
function getStock(productId, size){
  const k=(p,s)=>p+'|'+(s||'');
  const sewn=S.sewnEntries.filter(c=>!c.deleted&&c.productId===productId&&(c.size||'')===(size||'')).reduce((s,c)=>s+(c.quantity||0),0);
  const sold=S.sales.filter(s=>!s.deleted).reduce((s,sl)=>{const it=sl.items||[];return s+it.filter(i=>i.productId===productId&&(i.size||'')===(size||'')).reduce((a,i)=>a+(i.quantity||0),0)},0);
  return Math.max(0,sewn-sold);
}

function getCutRemaining(productId, size){
  const cut=S.cutEntries.filter(c=>!c.deleted&&c.productId===productId&&(c.size||'')===(size||'')).reduce((s,c)=>s+(c.quantity||0),0);
  const sewn=S.sewnEntries.filter(c=>!c.deleted&&c.productId===productId&&(c.size||'')===(size||'')).reduce((s,c)=>s+(c.quantity||0),0);
  return Math.max(0,cut-sewn);
}

function rTimingTable(el){

    let allocs=[];
    sizes.forEach(sz=>{allocs=allocs.concat(computeFIFO(pid,sz))});
    const tDays=allocs.reduce((s,a)=>s+a.days*a.qty,0);
    const tQty=allocs.reduce((s,a)=>s+a.qty,0);
    const avg=tQty>0?Math.round(tDays/tQty):null;
    const min=allocs.length?Math.min(...allocs.map(a=>a.days)):null;
    const max=allocs.length?Math.max(...allocs.map(a=>a.days)):null;
    return{pid,avg,min,max,tQty};
  }).sort((a,b)=>(b.avg||0)-(a.avg||0));

  el.innerHTML=`<div class="cct-list">${rows.map(r=>`<div class="cct">

}

/* Thanh phân trang dùng chung: page hiện tại (1-based), tổng số trang, callback khi đổi trang */
function pagerHtml(page,total){
  if(total<=1)return'';
  const set=new Set([1,total,page,page-1,page+1]);
  const nums=[...set].filter(p=>p>=1&&p<=total).sort((a,b)=>a-b);
  let html=`<div class="pg-count">Trang ${page}/${total}</div><div class="pager">`;
  html+=`<button class="pgbtn pg-go" data-p="${Math.max(1,page-1)}" ${page<=1?'disabled':''}>‹</button>`;
  let prev=0;
  nums.forEach(p=>{
    if(prev&&p-prev>1)html+=`<span class="pgdots">…</span>`;
    html+=`<button class="pgbtn pg-go${p===page?' on':''}" data-p="${p}">${p}</button>`;
    prev=p;
  });
  html+=`<button class="pgbtn pg-go" data-p="${Math.min(total,page+1)}" ${page>=total?'disabled':''}>Kế tiếp ›</button>`;
  html+='</div>';
  return html;
}
function wirePager(el,getSet){
  el.querySelectorAll('.pg-go').forEach(b=>b.addEventListener('click',()=>{getSet(+b.dataset.p);render()}));
}

function rCutHist(el){
  const [fr,to]=gRange(pdF);
  const active=S.cutEntries.filter(c=>!c.deleted&&inR(c.date,fr,to)&&(pdF.productId==='all'||c.productId===pdF.productId));
  const deleted=S.cutEntries.filter(c=>c.deleted&&inR(c.deletedAt||c.date,fr,to)&&(pdF.productId==='all'||c.productId===pdF.productId));
  const items=[...active,...deleted].sort((a,b)=>b.date>a.date?1:-1);
  if(!items.length){el.innerHTML=`<div class="empty"><div class="ei">✂️</div>Chưa có lô cắt</div>`;return}
  const totalPages=Math.max(1,Math.ceil(items.length/PG_SIZE));
  if(pgCut>totalPages)pgCut=totalPages;
  const pageItems=items.slice((pgCut-1)*PG_SIZE,pgCut*PG_SIZE);
  el.innerHTML=pageItems.map(c=>`<div class="hi${c.deleted?' deleted':''}">
    <div class="hi-head">
      <div>
        <div class="hi-name">${esc(gPN(c.productId))} <span class="bdg bb">${esc(c.size)}</span> ${c.deleted?'<span class="deleted-label">🗑 Đã xoá</span>':''}</div>
        <div class="hi-date">✂️ ${fD(c.date)}${c.note?` · ${esc(c.note)}`:''}</div>
      </div>
      <div style="text-align:right"><div class="tb" style="font-size:18px;font-weight:700">${fN(c.deleted&&c._qty!==undefined?c._qty:c.quantity)}</div><div class="mu" style="font-size:10px">sp cắt</div></div>
    </div>
    ${!c.deleted?`<div class="hi-acts">
      <button class="btn bs bxs ec" data-id="${c.id}">✏️ Sửa</button>
      <button class="btn bd bxs dc" data-id="${c.id}">🗑 Xoá</button>
    </div>`:`<div class="hi-acts"><button class="btn bs bxs undo-c" data-id="${c.id}">↩ Khôi phục</button><button class="btn bd bxs perm-c" data-id="${c.id}">🗑 Xoá hẳn</button></div>`}
  </div>`).join('')+pagerHtml(pgCut,totalPages);

  el.querySelectorAll('.ec').forEach(b=>b.addEventListener('click',()=>{
    const c=S.cutEntries.find(x=>x.id===b.dataset.id);if(!c)return;
    openEditModal('Sửa lô cắt',[
      {id:'eq',label:'Số lượng cắt',type:'number',value:c.quantity},
      {id:'ed',label:'Ngày cắt',type:'date',value:c.date},
      {id:'en',label:'Ghi chú',type:'text',value:c.note||''}
    ],vals=>{c.quantity=parseInt(vals.eq)||0;c.date=vals.ed||now();c.note=vals.en;save();render();toast('Đã cập nhật')});
  }));
  el.querySelectorAll('.dc').forEach(b=>b.addEventListener('click',()=>{
    if(!confirm('Xoá lô cắt? (vẫn hiện trong lịch sử)'))return;
    const c=S.cutEntries.find(x=>x.id===b.dataset.id);if(!c)return;
    c._qty=c.quantity;c.deleted=true;c.deletedAt=new Date().toISOString();c.quantity=0;save();render();toast('Đã xoá (lịch sử vẫn lưu)');
  }));
  el.querySelectorAll('.undo-c').forEach(b=>b.addEventListener('click',()=>{
    const c=S.cutEntries.find(x=>x.id===b.dataset.id);if(!c)return;
    c.deleted=false;if(c._qty!==undefined){c.quantity=c._qty;delete c._qty}delete c.deletedAt;save();render();toast('Đã khôi phục');
  }));
  el.querySelectorAll('.perm-c').forEach(b=>b.addEventListener('click',()=>{
    if(!confirm('Xoá HẲN lô cắt này khỏi lịch sử? Không thể khôi phục.'))return;
    S.cutEntries=S.cutEntries.filter(x=>x.id!==b.dataset.id);save();render();toast('Đã xoá hẳn khỏi lịch sử');
  }));
  wirePager(el,p=>pgCut=p);
}

      const qty=parseInt(qi?.value)||0;
      if(qty<=0)continue;
      const avail=getCutRemaining(selPid,s);
      const inCart=swnCart.filter(r=>r.productId===selPid&&r.size===s).reduce((a,r)=>a+(r.quantity||0),0);
      if(qty>(avail-inCart)){toast(`Size ${s}: Số may (${qty}) > còn có thể may (${avail-inCart})`,true);blocked=true;break}
      const exist=swnCart.find(r=>r.productId===selPid&&r.size===s);
      if(exist)exist.quantity+=qty;else swnCart.push({productId:selPid,size:s,quantity:qty,date,priceUnit:pu,note:swnNote});added++;
    }
    if(blocked)return;
    if(!added){toast('Nhập số lượng ít nhất 1 size',true);return}
    selSizes=[];szQty={};el.querySelector('#sw_sp').value='';selPid='';refreshPicker();render();
  });

  if(swnCart.length){
    const cc=el.querySelector('#SW_CART');
    cc.innerHTML=swnCart.map((r,i)=>{
      const avail=getCutRemaining(r.productId,r.size)+r.quantity; // add back own qty for display
      return`<div class="cart-row">
        <div class="cart-info">${esc(gPN(r.productId))} <span class="bdg bg2">${esc(r.size)}</span> <span class="ci-sub">· ${fD(r.date)} · ${fM(r.priceUnit)}/sp</span></div>
        <div class="cart-qty"><input type="number" min="1" value="${r.quantity}" data-i="${i}"> sp</div>
        <span class="mu" style="font-size:10px">Còn cắt: ${fN(avail)}</span>
        <button class="btn bd bxs rm-sw" data-i="${i}">×</button>
      </div>`;
    }).join('');
    cc.querySelectorAll('input[data-i]').forEach(inp=>inp.addEventListener('input',e=>{swnCart[+e.target.dataset.i].quantity=parseInt(e.target.value)||0}));
    cc.querySelectorAll('.rm-sw').forEach(b=>b.addEventListener('click',()=>{swnCart.splice(+b.dataset.i,1);render()}));
    el.querySelector('#sw_clr').addEventListener('click',()=>{swnCart=[];render()});
    el.querySelector('#sw_sv').addEventListener('click',()=>{
      // Validate lại
      // Validate tổng hợp: group by SP+size
      const grouped={};
      for(const r of swnCart){
        if(r.quantity<=0)continue;
        const k=r.productId+'|'+r.size;
        grouped[k]=(grouped[k]||{pid:r.productId,sz:r.size,total:0});
        grouped[k].total+=r.quantity;
      }
      for(const g of Object.values(grouped)){
        const avail=getCutRemaining(g.pid,g.sz);
        if(g.total>avail){toast(`${gPN(g.pid)} size ${g.sz}: tổng may (${g.total}) > còn cắt (${avail})`,true);return}
      }
      const valid=swnCart.filter(r=>r.quantity>0);
      valid.forEach(r=>S.sewnEntries.push({id:uid(),productId:r.productId,size:r.size,quantity:r.quantity,priceUnit:r.priceUnit,date:r.date,note:r.note,createdAt:new Date().toISOString()}));
      save();swnCart=[];render();toast(`Đã lưu ${valid.length} lô may`);
    });
  }

  rCvMTable(el.querySelector('#CV_TBL'));
  const fl=el.querySelector('#SW_FLT');mkFilter(fl,pdF,render,{showProd:true});
  rSwnHist(el.querySelector('#SW_LST'));
}

function rCvMTable(el){
  const mp={};
  S.cutEntries.filter(c=>!c.deleted).forEach(c=>{const k=c.productId+'|'+(c.size||'');if(!mp[k])mp[k]={pid:c.productId,sz:c.size,cut:0,swn:0,sold:0};mp[k].cut+=c.quantity||0});
  S.sewnEntries.filter(c=>!c.deleted).forEach(c=>{const k=c.productId+'|'+(c.size||'');if(!mp[k])mp[k]={pid:c.productId,sz:c.size,cut:0,swn:0,sold:0};mp[k].swn+=c.quantity||0});
  S.sales.filter(s=>!s.deleted).forEach(sl=>(sl.items||[]).forEach(i=>{const k=i.productId+'|'+(i.size||'');if(mp[k])mp[k].sold+=i.quantity||0}));
  const rows=Object.values(mp);
  if(!rows.length){el.innerHTML=`<div class="empty"><div class="ei">📊</div>Chưa có dữ liệu</div>`;return}
  el.innerHTML=`<div class="cct-list">${rows.map(r=>{
    const rem=r.cut-r.swn,stk=r.swn-r.sold,pct=r.cut?Math.round(r.swn/r.cut*100):0;
    return`<div class="cct">
      <div class="cct-top">
        <div class="cct-name"><span class="tn2">${esc(gPN(r.pid))}</span>${r.sz?`<span class="bdg bgr">${esc(r.sz)}</span>`:''}</div>
        <div class="cct-avg ${stk<0?'tr':''}">Tồn: ${fN(Math.max(0,stk))}</div>
      </div>
      <div class="cct-mets">
        <span>Cắt: <b class="tb">${fN(r.cut)}</b></span>
        <span>May: <b class="tg">${fN(r.swn)}</b></span>
        <span>Chưa may: <b class="${rem>0?'tgo':''}">${fN(rem)}</b></span>
        <span>Xuất: <b>${fN(r.sold)}</b></span>
      </div>
      <div class="cct-prog">
        <div class="pw"><div class="pb" style="width:${Math.min(pct,100)}%"></div></div>
        <span class="pct">${pct}%</span>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function rSwnHist(el){
  const [fr,to]=gRange(pdF);
  const active=S.sewnEntries.filter(c=>!c.deleted&&inR(c.date,fr,to)&&(pdF.productId==='all'||c.productId===pdF.productId));
  const deleted=S.sewnEntries.filter(c=>c.deleted&&inR(c.deletedAt||c.date,fr,to)&&(pdF.productId==='all'||c.productId===pdF.productId));
  const items=[...active,...deleted].sort((a,b)=>b.date>a.date?1:-1);
  if(!items.length){el.innerHTML=`<div class="empty"><div class="ei">🧵</div>Chưa có lô may</div>`;return}
  const totalPages=Math.max(1,Math.ceil(items.length/PG_SIZE));
  if(pgSwn>totalPages)pgSwn=totalPages;
  const pageItems=items.slice((pgSwn-1)*PG_SIZE,pgSwn*PG_SIZE);
  el.innerHTML=pageItems.map(c=>{
    // FIFO allocations for this sewn entry
    const allocs=computeFIFO(c.productId,c.size).filter(a=>a.sewnId===c.id);
    const allocHtml=allocs.length?`<div class="mt8" style="background:var(--bg-s);border-radius:var(--rs);padding:7px 9px;font-size:11px">
      ${allocs.map(a=>`<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--ln-s)"><span>↳ Từ lô cắt ngày <b>${fD(a.cutDate)}</b></span><span><b>${fN(a.qty)}</b> sp · <b class="${a.days>14?'tr':'tg'}">${a.days} ngày</b></span></div>`).join('')}
    </div>`:'';
    return`<div class="hi${c.deleted?' deleted':''}">
      <div class="hi-head">
        <div>
          <div class="hi-name">${esc(gPN(c.productId))} <span class="bdg bg2">${esc(c.size)}</span> ${c.deleted?'<span class="deleted-label">🗑 Đã xoá</span>':''}</div>
          <div class="hi-date">🗓 Hoàn thành: ${fD(c.date)}${c.note?` · ${esc(c.note)}`:''} ${c.priceUnit?`· ${fM(c.priceUnit)}/sp`:''}</div>
        </div>
        <div style="text-align:right"><div class="tg" style="font-size:18px;font-weight:700">${fN(c.deleted&&c._qty!==undefined?c._qty:c.quantity)}</div><div class="mu" style="font-size:10px">sp may</div>${(c.deleted&&c._qty!==undefined?c._qty:c.quantity)&&c.priceUnit?`<div class="tgo" style="font-size:11px;font-weight:600">${fM((c.deleted&&c._qty!==undefined?c._qty:c.quantity)*c.priceUnit)}</div>`:''}</div>
      </div>
      ${allocHtml}
      ${!c.deleted?`<div class="hi-acts"><button class="btn bs bxs es" data-id="${c.id}">✏️ Sửa</button><button class="btn bd bxs ds" data-id="${c.id}">🗑 Xoá</button></div>`:`<div class="hi-acts"><button class="btn bs bxs undo-s" data-id="${c.id}">↩ Khôi phục</button><button class="btn bd bxs perm-s" data-id="${c.id}">🗑 Xoá hẳn</button></div>`}
    </div>`;
  }).join('')+pagerHtml(pgSwn,totalPages);

  el.querySelectorAll('.es').forEach(b=>b.addEventListener('click',()=>{
    const c=S.sewnEntries.find(x=>x.id===b.dataset.id);if(!c)return;
    openEditModal('Sửa lô may',[
      {id:'eq',label:'Số lượng may',type:'number',value:c.quantity},
      {id:'ed',label:'Ngày hoàn thành',type:'date',value:c.date},
      {id:'ep',label:'Giá/SP (đ)',type:'number',value:c.priceUnit||''},
      {id:'en',label:'Ghi chú',type:'text',value:c.note||''}
    ],vals=>{
      const newQty=parseInt(vals.eq)||0;
      const avail=getCutRemaining(c.productId,c.size)+c.quantity;
      if(newQty>avail){toast(`Số may (${newQty}) > còn cắt (${avail})`,true);return}
      c.quantity=newQty;c.date=vals.ed||now();c.priceUnit=parseFloat(vals.ep)||0;c.note=vals.en;
      save();render();toast('Đã cập nhật');
    });
  }));
  el.querySelectorAll('.ds').forEach(b=>b.addEventListener('click',()=>{
    if(!confirm('Xoá lô may? (vẫn hiện trong lịch sử)'))return;
    const c=S.sewnEntries.find(x=>x.id===b.dataset.id);if(!c)return;
    c._qty=c.quantity;c.deleted=true;c.deletedAt=new Date().toISOString();c.quantity=0;save();render();toast('Đã xoá (lịch sử vẫn lưu)');
  }));
  el.querySelectorAll('.undo-s').forEach(b=>b.addEventListener('click',()=>{
    const c=S.sewnEntries.find(x=>x.id===b.dataset.id);if(!c)return;
    c.deleted=false;if(c._qty!==undefined){c.quantity=c._qty;delete c._qty}delete c.deletedAt;save();render();toast('Đã khôi phục');
  }));
  el.querySelectorAll('.perm-s').forEach(b=>b.addEventListener('click',()=>{
    if(!confirm('Xoá HẲN lô may này khỏi lịch sử? Không thể khôi phục.'))return;
    S.sewnEntries=S.sewnEntries.filter(x=>x.id!==b.dataset.id);save();render();toast('Đã xoá hẳn khỏi lịch sử');
  }));
  wirePager(el,p=>pgSwn=p);
}

/* ============ KHO / XUẤT ============ */
function rInv(el){
  const allSewn=S.sewnEntries.filter(c=>!c.deleted).reduce((s,c)=>s+(c.quantity||0),0);
  const allSold=S.sales.filter(s=>!s.deleted).reduce((s,sl)=>(sl.items||[]).reduce((a,i)=>a+(i.quantity||0),s),0);
  const allCut=S.cutEntries.filter(c=>!c.deleted).reduce((s,c)=>s+(c.quantity||0),0);

  el.innerHTML=`
<div class="sg" style="grid-template-columns:repeat(2,1fr)">
  <div class="st" data-t="s"><div class="st-l">Tổng đã may</div><div class="st-v">${fN(allSewn)}</div><div class="st-s">sp hoàn thành</div></div>
  <div class="st" data-t="c"><div class="st-l">Chưa may</div><div class="st-v">${fN(Math.max(0,allCut-allSewn))}</div><div class="st-s">trong kho cắt</div></div>
  <div class="st" data-t="o"><div class="st-l">Đã xuất</div><div class="st-v">${fN(allSold)}</div><div class="st-s">sp đã bán</div></div>
  <div class="st" data-t="k"><div class="st-l">Còn tồn</div><div class="st-v">${fN(Math.max(0,allSewn-allSold))}</div><div class="st-s">đã may − xuất</div></div>
</div>
<div class="iform sec">
  <div class="iform-t">📤 Nhập xuất hàng</div>
  <div class="fg fg3" style="gap:9px">
    <div class="fld"><label>Sản phẩm *</label><select class="sel" id="sl_sp"><option value="">-- Chọn SP --</option>${S.products.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}</select></div>
    <div class="fld"><label>Ngày xuất</label><input class="inp" type="date" id="sl_dt" value="${salDate}"></div>
    <div class="fld"><label>Đơn giá bán (đ)</label><input class="inp" type="number" id="sl_pr" placeholder="0" value="${esc(salPrice)}"></div>
  </div>
  <div class="fld mt8"><label>Ghi chú (đơn hàng, khách...)</label><input class="inp" id="sl_nt" placeholder="Tuỳ chọn" value="${esc(salNote)}"></div>
  <div class="fld mt8"><label>Chọn size</label><div id="sl_pk" class="mt8"></div></div>
  <div id="sl_rw" class="mt8"></div>
  <button class="btn bs bsm mt8" id="sl_add">+ Thêm vào đơn</button>
  <div class="hint mt8">⚠️ Bước 1: Thêm vào đơn bên dưới. Bước 2: Bấm "Xác nhận xuất" để lưu thật. (Có thể thêm nhiều SP khác nhau vào cùng 1 đơn)</div>
</div>
${salCart.length?`<div class="cart">
  <div class="cart-title"><span>🛒 Đơn chờ xuất (${salCart.length} dòng) — CHƯA được ghi nhận</span><button class="btn bd bxs" id="sl_clr">Xoá đơn</button></div>
  <div id="SL_CART"></div>
  <div class="mt8"><button class="btn bgrn bblk" id="sl_sv">✅ Xác nhận xuất ${salCart.length} dòng (lưu vào hệ thống)</button></div>
</div>`:''}
<div class="sec"><div class="sh"><div class="st2">Tồn kho theo SP & Size</div></div><div id="INV_TBL"></div></div>
<div class="sec"><div class="sh"><div class="st2">Lịch sử xuất hàng</div></div><div id="SL_FLT"></div><div id="SL_LST"></div></div>`;

  let selPid='', selSizes=[], szQty={};
  const pk=el.querySelector('#sl_pk'), rw=el.querySelector('#sl_rw');

  const refreshPicker=()=>{
    if(!selPid){pk.innerHTML='<div class="hint">Chọn sản phẩm trước</div>';rw.innerHTML='';return}
    const prod=gP(selPid);const sizes=prod?.sizes||[];
    if(!sizes.length){pk.innerHTML='<div class="hint">Sản phẩm chưa có size</div>';rw.innerHTML='';return}
    pk.innerHTML=`<div class="size-pick-row">${sizes.map(s=>{
      const on=selSizes.includes(s),stk=getStock(selPid,s);
      return`<button class="spick${on?' on':''}${stk<=0?' warn':''}" data-s="${esc(s)}">${esc(s)} <small>(${fN(stk)})</small></button>`;
    }).join('')}</div>`;
    pk.querySelectorAll('.spick').forEach(b=>b.addEventListener('click',()=>{const s=b.dataset.s;if(selSizes.includes(s))selSizes=selSizes.filter(x=>x!==s);else selSizes.push(s);refreshPicker()}));
    rw.innerHTML=selSizes.map((s,i)=>{
      const stk=getStock(selPid,s);
      return`<div class="sr-row"><span class="sr-lbl">${esc(s)}</span><input class="inp" type="number" min="0" placeholder="Max: ${stk}" data-s="${esc(s)}" id="sl_q_${i}" value="${esc(szQty[s]||'')}"><span class="sr-avail ${stk<=0?'tr':''}">Tồn: <b>${fN(stk)}</b></span><button class="btn bd bxs rm-s" data-s="${esc(s)}">×</button></div>`;

  el.querySelector('#sl_add').addEventListener('click',()=>{

    for(const s of selSizes){

      const qty=parseInt(qi?.value)||0;if(qty<=0)continue;
      const stk=getStock(selPid,s);
      if(qty>stk&&!confirm(`Size ${s} xuất ${qty} vượt tồn ${stk}. Tiếp tục?`))continue;
      // Nếu đã có dòng cùng SP+size trong giỏ thì cộng dồn
      const exist=salCart.find(r=>r.productId===selPid&&r.size===s);
      if(exist)exist.quantity+=qty;else salCart.push({productId:selPid,size:s,quantity:qty});
      added++;
    }
    if(!added){toast('Nhập số lượng ít nhất 1 size',true);return}
    selSizes=[];szQty={};el.querySelector('#sl_sp').value='';selPid='';refreshPicker();render();
  });

  if(salCart.length){

      <div class="cart-qty"><input type="number" min="1" value="${r.quantity}" data-i="${i}"> sp</div>
      <span class="tgo" style="font-size:12px;font-weight:600">${fM(r.quantity*parseFloat(salPrice||0))}</span>
      <button class="btn bd bxs rm-sl" data-i="${i}">×</button>
    </div>`).join('');
    const totalSalQty=salCart.reduce((s,r)=>s+(r.quantity||0),0);
    cc.innerHTML+=`<div style="text-align:right;padding-top:8px;font-weight:700;font-size:13px">Tổng: ${fN(totalSalQty)} sp · ${fM(totalSalQty*parseFloat(salPrice||0))}</div>`;
    cc.querySelectorAll('input[data-i]').forEach(inp=>inp.addEventListener('input',e=>{salCart[+e.target.dataset.i].quantity=parseInt(e.target.value)||0;render()}));
    cc.querySelectorAll('.rm-sl').forEach(b=>b.addEventListener('click',()=>{salCart.splice(+b.dataset.i,1);render()}));
    el.querySelector('#sl_clr').addEventListener('click',()=>{salCart=[];render()});
    el.querySelector('#sl_sv').addEventListener('click',()=>{
      const p=parseFloat(el.querySelector('#sl_pr')?.value||salPrice)||0;
      const d=el.querySelector('#sl_dt')?.value||salDate;
      const n=el.querySelector('#sl_nt')?.value||salNote;
      const valid=salCart.filter(r=>r.quantity>0);
      if(!valid.length){toast('Không có dòng hợp lệ',true);return}
      S.sales.push({id:uid(),items:valid.map(r=>({...r})),price:p,date:d,note:n,createdAt:new Date().toISOString()});
      save();salCart=[];salPrice='';salNote='';render();toast(`Đã xuất ${valid.length} dòng hàng`);
    });
  }

  rCvMTable(el.querySelector('#INV_TBL'));
  const fl=el.querySelector('#SL_FLT');mkFilter(fl,pdF,render,{showProd:false});
  rSaleHist(el.querySelector('#SL_LST'));
}

  if(!items.length){el.innerHTML=`<div class="empty"><div class="ei">📦</div>Chưa có giao dịch xuất hàng</div>`;return}

          <div class="hi-name">📦 Đơn xuất ${s.deleted?'<span class="deleted-label">🗑 Đã xoá</span>':''}</div>
          <div class="hi-date">📅 ${fD(s.date)}${s.note?` · ${esc(s.note)}`:''}</div>
        </div>
        <div style="text-align:right"><div style="font-size:16px;font-weight:700">${fN(totalQty)} sp</div><div class="tg" style="font-size:12px;font-weight:600">${fM(total)}</div></div>
      </div>
      <div class="mt8" style="background:var(--bg-s);border-radius:var(--rs);padding:7px 9px">${itemsHtml}</div>
      ${!s.deleted?`<div class="hi-acts"><button class="btn bs bxs esl" data-id="${s.id}">✏️ Sửa</button><button class="btn bd bxs dsl" data-id="${s.id}">🗑 Xoá</button></div>`:`<div class="hi-acts"><button class="btn bs bxs undo-sl" data-id="${s.id}">↩ Khôi phục</button><button class="btn bd bxs perm-sl" data-id="${s.id}">🗑 Xoá hẳn</button></div>`}
    </div>`;
  }).join('')+pagerHtml(pgSal,totalPages);
  el.querySelectorAll('.esl').forEach(b=>b.addEventListener('click',()=>{
    const s=S.sales.find(x=>x.id===b.dataset.id);if(!s)return;
    openEditModal('Sửa đơn xuất',[
      {id:'ep',label:'Đơn giá bán (đ)',type:'number',value:s.price||''},
      {id:'ed',label:'Ngày xuất',type:'date',value:s.date},
      {id:'en',label:'Ghi chú',type:'text',value:s.note||''}
    ],vals=>{s.price=parseFloat(vals.ep)||0;s.date=vals.ed||now();s.note=vals.en;save();render();toast('Đã cập nhật đơn xuất')});
  }));
  el.querySelectorAll('.dsl').forEach(b=>b.addEventListener('click',()=>{
    if(!confirm('Xoá đơn xuất? (vẫn hiện trong lịch sử)'))return;
    const s=S.sales.find(x=>x.id===b.dataset.id);if(!s)return;
    s.deleted=true;s.deletedAt=new Date().toISOString();save();render();toast('Đã xoá đơn');
  }));
  el.querySelectorAll('.undo-sl').forEach(b=>b.addEventListener('click',()=>{
    const s=S.sales.find(x=>x.id===b.dataset.id);if(!s)return;
    s.deleted=false;delete s.deletedAt;save();render();toast('Đã khôi phục');
  }));
  el.querySelectorAll('.perm-sl').forEach(b=>b.addEventListener('click',()=>{
    if(!confirm('Xoá HẲN đơn xuất này khỏi lịch sử? Không thể khôi phục.'))return;
    S.sales=S.sales.filter(x=>x.id!==b.dataset.id);save();render();toast('Đã xoá hẳn khỏi lịch sử');
  }));
  wirePager(el,p=>pgSal=p);
}

/* ================================================================
   PAGE: CHI PHÍ
   ================================================================ */
const CCATS=['Lương thợ','Nguyên liệu','Vận chuyển','Sinh hoạt','Điện nước','Thuê mặt bằng','Khác'];
const CCL=['ct-0','ct-1','ct-2','ct-3','ct-4','ct-5','ct-6'];
const CCOL=['#6b2d8b','#2b5fa0','#b8923f','#3d6b37','#b85c10','#b33','#555'];

let csF={period:'all',from:'',to:'',category:'all'};
let csRows=[{category:'Lương thợ',description:'',amount:'',date:now()}];
let csEdit=null;

function filtCs(){
  const[fr,to]=gRange(csF);
  return S.costs.filter(c=>!c.deleted&&inR(c.date,fr,to)&&(csF.category==='all'||c.category===csF.category));
}
function filtCsAll(){
  const[fr,to]=gRange(csF);
  return S.costs.filter(c=>inR(c.date,fr,to));
}

function rCs(el){
  const isEd=!!csEdit;
  const allPeriod=filtCsAll().filter(c=>!c.deleted);

  el.innerHTML=`
<div class="page-title">Chi phí</div>
<div class="page-sub">Nhập nhiều khoản cùng lúc — bấm vào ô để lọc</div>

<div class="iform sec">
  <div class="iform-t"><span>${isEd?'✏️ Sửa khoản chi':'➕ Nhập chi phí'}</span>
    <div style="display:flex;gap:5px">${isEd?`<button class="btn bg bsm" id="cs_cl">Huỷ sửa</button>`:
    `<button class="btn bs bsm" id="cs_ar">+ Thêm dòng</button>`}</div>
  </div>
  <div id="CS_ROWS"></div>
  <div class="mt8"><button class="btn bp" id="cs_sv">${isEd?'💾 Cập nhật':'✅ Lưu tất cả'}</button></div>
</div>

<div class="sec">
  <div class="sh"><div class="st2">Thống kê theo loại</div></div>
  <div id="CS_FBAR"></div>
  <div id="CS_CHIPS"></div>
  <div id="CS_TOTAL"></div>
  <div class="sh mt8"><div class="st2">Lịch sử chi phí</div></div>
  <div id="CS_LST"></div>
</div>`;

  rCsRows(el);
  el.querySelector('#cs_ar')?.addEventListener('click',()=>{csRows.push({category:'Lương thợ',description:'',amount:'',date:now()});rCsRows(el)});
  el.querySelector('#cs_cl')?.addEventListener('click',()=>{csEdit=null;csRows=[{category:'Lương thợ',description:'',amount:'',date:now()}];render()});
  el.querySelector('#cs_sv').addEventListener('click',()=>saveCsRows(el));

  rCsFbar(el.querySelector('#CS_FBAR'));
  rCsChips(el.querySelector('#CS_CHIPS'),el.querySelector('#CS_TOTAL'));
  rCsHist(el.querySelector('#CS_LST'));
}

function rCsRows(el){
  const rw=el.querySelector('#CS_ROWS');if(!rw)return;
  if(csEdit){
    const c=csEdit;
    rw.innerHTML=`<div class="fg fg1" style="gap:9px">
      <div class="fld"><label>Loại *</label>
        <div class="cat-chips" style="margin:5px 0">${CCATS.map((cat,i)=>`<button class="cchip${c.category===cat?' on':''} cc-sel" data-c="${esc(cat)}" style="${c.category===cat?`background:${CCOL[i]};color:#fff;border-color:${CCOL[i]}`:''}">${esc(cat)}</button>`).join('')}</div>
        <input type="hidden" id="ce_cat" value="${esc(c.category)}">
      </div>
      <div class="fg fg2" style="gap:9px">
        <div class="fld"><label>Ngày</label><input class="inp" type="date" id="ce_dt" value="${c.date}"></div>
        <div class="fld"><label>Số tiền (đ) *</label><input class="inp" type="number" id="ce_am" placeholder="0" value="${c.amount}"></div>
      </div>
      <div class="fld"><label>Mô tả</label><input class="inp" id="ce_ds" placeholder="Chi tiết..." value="${esc(c.description||'')}"></div>
    </div>`;
    rw.querySelectorAll('.cc-sel').forEach((b,bi)=>b.addEventListener('click',()=>{
      rw.querySelectorAll('.cc-sel').forEach((x,xi)=>{x.className='cchip cc-sel';x.style.cssText=''});
      b.classList.add('on');b.style.cssText=`background:${CCOL[CCATS.indexOf(b.dataset.c)]};color:#fff;border-color:${CCOL[CCATS.indexOf(b.dataset.c)]}`;
      rw.querySelector('#ce_cat').value=b.dataset.c;
    }));
    return;
  }
  rw.innerHTML=csRows.map((r,i)=>`<div style="${i>0?'border-top:1px solid var(--ln-s);padding-top:11px;margin-top:11px':''}">
    ${csRows.length>1?`<div style="display:flex;justify-content:flex-end;margin-bottom:5px"><button class="btn bd bxs rm-cr" data-i="${i}">× Xoá dòng</button></div>`:''}
    <div class="fg fg1" style="gap:9px">
      <div class="fld"><label>Loại *</label>
        <div class="cat-chips" style="margin:5px 0">${CCATS.map((cat,ci)=>`<button class="cchip${r.category===cat?' on':''} cr-cat" data-i="${i}" data-c="${esc(cat)}" style="${r.category===cat?`background:${CCOL[ci]};color:#fff;border-color:${CCOL[ci]}`:''}">${esc(cat)}</button>`).join('')}</div>
        <input type="hidden" class="cr-cat-val" data-i="${i}" value="${esc(r.category)}">
      </div>
      <div class="fg fg2" style="gap:9px">
        <div class="fld"><label>Ngày</label><input class="inp cr-dt" type="date" data-i="${i}" value="${r.date}"></div>
        <div class="fld"><label>Số tiền (đ) *</label><input class="inp cr-am" type="number" data-i="${i}" placeholder="0" value="${r.amount}"></div>
      </div>
      <div class="fld"><label>Mô tả</label><input class="inp cr-ds" type="text" data-i="${i}" placeholder="Mô tả chi tiết..." value="${esc(r.description)}"></div>
    </div>
  </div>`).join('');
  rw.querySelectorAll('.cr-cat').forEach(b=>b.addEventListener('click',()=>{
    const idx=+b.dataset.i,cat=b.dataset.c,ci=CCATS.indexOf(cat);
    csRows[idx].category=cat;
    rw.querySelectorAll(`.cr-cat[data-i="${idx}"]`).forEach((x,xi)=>{x.className=`cchip cr-cat`;x.style.cssText='';x.dataset.i=idx});
    b.classList.add('on');b.style.cssText=`background:${CCOL[ci]};color:#fff;border-color:${CCOL[ci]}`;
    rw.querySelector(`.cr-cat-val[data-i="${idx}"]`).value=cat;
  }));
  rw.querySelectorAll('.cr-dt').forEach(s=>s.addEventListener('change',e=>{csRows[+e.target.dataset.i].date=e.target.value}));
  rw.querySelectorAll('.cr-ds').forEach(s=>s.addEventListener('input',e=>{csRows[+e.target.dataset.i].description=e.target.value}));
  rw.querySelectorAll('.cr-am').forEach(s=>s.addEventListener('input',e=>{csRows[+e.target.dataset.i].amount=e.target.value}));
  rw.querySelectorAll('.rm-cr').forEach(b=>b.addEventListener('click',()=>{csRows.splice(+b.dataset.i,1);rCsRows(el)}));
}

function saveCsRows(el){
  if(csEdit){
    const c=S.costs.find(x=>x.id===csEdit.id);if(!c)return;
    c.category=el.querySelector('#ce_cat').value||csEdit.category;
    c.date=el.querySelector('#ce_dt').value||now();
    c.description=el.querySelector('#ce_ds').value.trim();
    c.amount=parseFloat(el.querySelector('#ce_am').value)||0;
    if(!c.amount){toast('Nhập số tiền',true);return}
    save();csEdit=null;csRows=[{category:'Lương thợ',description:'',amount:'',date:now()}];render();toast('Đã cập nhật');return;
  }
  const valid=csRows.filter(r=>parseFloat(r.amount)>0);
  if(!valid.length){toast('Nhập ít nhất 1 khoản có số tiền',true);return}
  valid.forEach(r=>S.costs.push({id:uid(),category:r.category,description:r.description.trim(),amount:parseFloat(r.amount)||0,date:r.date||now(),createdAt:new Date().toISOString()}));
  save();csRows=[{category:'Lương thợ',description:'',amount:'',date:now()}];render();toast(`Đã lưu ${valid.length} khoản`);
}

function rCsFbar(el){
  const isC=csF.period==='custom';
  el.innerHTML=`<div class="fb">
    <select class="sel" id="cf_p"><option value="all" ${csF.period==='all'?'selected':''}>Tất cả</option><option value="week" ${csF.period==='week'?'selected':''}>Tuần này</option><option value="month" ${csF.period==='month'?'selected':''}>Tháng này</option><option value="lastmonth" ${csF.period==='lastmonth'?'selected':''}>Tháng trước</option><option value="custom" ${csF.period==='custom'?'selected':''}>Tùy chọn</option></select>
  </div>
  <div id="cf_cd" style="display:${isC?'flex':'none'};gap:7px;margin-bottom:11px;flex-wrap:wrap">
    <div class="fld" style="flex:1;min-width:120px"><label>Từ ngày</label><input class="inp" type="date" id="cf_fr" value="${csF.from||''}"></div>
    <div class="fld" style="flex:1;min-width:120px"><label>Đến ngày</label><input class="inp" type="date" id="cf_to" value="${csF.to||''}"></div>
  </div>`;
  el.querySelector('#cf_p').addEventListener('change',e=>{csF.period=e.target.value;el.querySelector('#cf_cd').style.display=e.target.value==='custom'?'flex':'none';render()});
  el.querySelector('#cf_fr')?.addEventListener('change',e=>{csF.from=e.target.value;render()});
  el.querySelector('#cf_to')?.addEventListener('change',e=>{csF.to=e.target.value;render()});
}

function rCsChips(chipEl, totalEl){
  const[fr,to]=gRange(csF);
  const allCosts=S.costs.filter(c=>!c.deleted&&inR(c.date,fr,to));
  const bycat={};CCATS.forEach(cat=>{bycat[cat]=allCosts.filter(c=>c.category===cat)});
  const grandTotal=allCosts.reduce((s,c)=>s+(c.amount||0),0);

  chipEl.innerHTML=`<div class="cs-chips">${CCATS.map((cat,i)=>{
    const its=bycat[cat],amt=its.reduce((s,c)=>s+(c.amount||0),0);
    const on=csF.category===cat;
    return`<div class="cs-chip${on?' on':''}" data-cat="${esc(cat)}" style="${on?`border-color:${CCOL[i]};box-shadow:0 0 0 2px ${CCOL[i]}33`:''}">
      <div class="cs-chip-name" style="color:${CCOL[i]}">${esc(cat)}</div>
      <div class="cs-chip-val" style="color:${CCOL[i]}">${fM(amt)}</div>
      <div class="cs-chip-cnt">${its.length} khoản · ${grandTotal?Math.round(amt/grandTotal*100):0}%</div>
    </div>`;
  }).join('')}</div>`;
  // "Tất cả" chip
  chipEl.innerHTML=`<div class="cs-chips"><div class="cs-chip${csF.category==='all'?' on':''}" data-cat="all" style="${csF.category==='all'?'border-color:var(--ink);box-shadow:0 0 0 2px rgba(26,26,26,.15)':''}"><div class="cs-chip-name">Tất cả</div><div class="cs-chip-val" style="color:var(--ink)">${fM(grandTotal)}</div><div class="cs-chip-cnt">${allCosts.length} khoản</div></div>${CCATS.map((cat,i)=>{
    const its=bycat[cat],amt=its.reduce((s,c)=>s+(c.amount||0),0);
    const on=csF.category===cat;
    return`<div class="cs-chip${on?' on':''}" data-cat="${esc(cat)}" style="${on?`border-color:${CCOL[i]};box-shadow:0 0 0 2px ${CCOL[i]}33`:''}"><div class="cs-chip-name" style="color:${CCOL[i]}">${esc(cat)}</div><div class="cs-chip-val" style="color:${CCOL[i]}">${fM(amt)}</div><div class="cs-chip-cnt">${its.length} khoản · ${grandTotal?Math.round(amt/grandTotal*100):0}%</div></div>`;
  }).join('')}</div>`;

  chipEl.querySelectorAll('.cs-chip').forEach(chip=>chip.addEventListener('click',()=>{
    csF.category=chip.dataset.cat;render();
  }));

  totalEl.innerHTML=`<div class="cs-total"><div class="cs-total-l">Tổng chi phí (${csF.category==='all'?'tất cả':csF.category})</div><div class="cs-total-v">${fM(filtCs().reduce((s,c)=>s+(c.amount||0),0))}</div></div>`;
}

function rCsHist(el){
  const [fr,to]=gRange(csF);
  const active=filtCs();
  const deletedInPeriod=S.costs.filter(c=>c.deleted&&inR(c.date,fr,to)&&(csF.category==='all'||c.category===csF.category));
  const its=[...active,...deletedInPeriod].sort((a,b)=>b.date>a.date?1:-1);
  if(!its.length){el.innerHTML=`<div class="empty"><div class="ei">💰</div>Chưa có chi phí</div>`;return}
  const totalPages=Math.max(1,Math.ceil(its.length/PG_SIZE));
  if(pgCs>totalPages)pgCs=totalPages;
  const shown=its.slice((pgCs-1)*PG_SIZE,pgCs*PG_SIZE);
  el.innerHTML=`<div class="tw"><table class="tbl"><thead><tr><th>Ngày</th><th>Loại</th><th>Mô tả</th><th>Số tiền</th><th></th></tr></thead><tbody>
  ${shown.map(c=>`<tr${c.deleted?' class="deleted"':''}>
    <td data-l="Ngày">${fD(c.date)}</td>
    <td data-l="Loại"><span style="display:inline-flex;padding:2px 7px;border-radius:999px;font-size:10px;font-weight:600;background:${CCOL[CCATS.indexOf(c.category)]}22;color:${CCOL[CCATS.indexOf(c.category)]}">${esc(c.category||'Khác')}${c.deleted?' 🗑':''}</span></td>
    <td data-l="Mô tả" class="tn">${esc(c.description||'—')}</td>
    <td data-l="Số tiền" class="cst">${fM(c.amount)}</td>
    <td class="ta">${!c.deleted
      ?`<button class="btn bs bxs ec2" data-id="${c.id}">✏️</button><button class="btn bd bxs dc2" data-id="${c.id}">🗑</button>`
      :`<button class="btn bs bxs undo2" data-id="${c.id}">↩</button><button class="btn bd bxs perm2" data-id="${c.id}">🗑 Xoá hẳn</button>`}
    </td>
  </tr>`).join('')}</tbody></table></div>${pagerHtml(pgCs,totalPages)}`;
  el.querySelectorAll('.ec2').forEach(b=>b.addEventListener('click',()=>{csEdit=S.costs.find(x=>x.id===b.dataset.id);render();window.scrollTo(0,0)}));
  el.querySelectorAll('.dc2').forEach(b=>b.addEventListener('click',()=>{
    if(!confirm('Xoá khoản chi? (vẫn hiện trong lịch sử)'))return;
    const c=S.costs.find(x=>x.id===b.dataset.id);if(!c)return;
    c.deleted=true;c.deletedAt=new Date().toISOString();save();render();toast('Đã xoá');
  }));
  el.querySelectorAll('.undo2').forEach(b=>b.addEventListener('click',()=>{
    const c=S.costs.find(x=>x.id===b.dataset.id);if(!c)return;
    c.deleted=false;delete c.deletedAt;save();render();toast('Đã khôi phục chi phí');
  }));
  el.querySelectorAll('.perm2').forEach(b=>b.addEventListener('click',()=>{
    if(!confirm('Xoá HẲN khoản chi này khỏi lịch sử? Không thể khôi phục.'))return;
    S.costs=S.costs.filter(x=>x.id!==b.dataset.id);save();render();toast('Đã xoá hẳn khỏi lịch sử');
  }));
  wirePager(el,p=>pgCs=p);
}

/* ================================================================
   EDIT MODAL (lightweight)
   ================================================================ */
function openEditModal(title, fields, onSave){
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(26,26,26,.5);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-end;justify-content:center';
  const box=document.createElement('div');
  box.style.cssText='background:var(--bg-e);border-radius:var(--rl) var(--rl) 0 0;width:100%;max-width:520px;padding:18px 20px;max-height:92vh;overflow-y:auto';
  box.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><span style="font-family:var(--fd);font-size:17px;font-weight:600">${esc(title)}</span><button id="em_cl" style="font-size:22px;color:var(--ink-m);background:none;border:none;cursor:pointer">×</button></div>
  <div class="fg fg1" style="gap:9px">${fields.map(f=>`<div class="fld"><label>${esc(f.label)}</label><input class="inp" id="em_${f.id}" type="${f.type||'text'}" value="${esc(String(f.value||''))}"></div>`).join('')}</div>
  <div style="display:flex;gap:7px;justify-content:flex-end;margin-top:14px"><button class="btn bs bsm" id="em_cn">Huỷ</button><button class="btn bp bsm" id="em_sv">💾 Lưu</button></div>`;
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  const close=()=>document.body.removeChild(overlay);
  box.querySelector('#em_cl').addEventListener('click',close);
  box.querySelector('#em_cn').addEventListener('click',close);
  overlay.addEventListener('click',e=>{if(e.target===overlay)close()});
  box.querySelector('#em_sv').addEventListener('click',()=>{
    const vals={};fields.forEach(f=>{vals[f.id]=box.querySelector(`#em_${f.id}`).value});
    onSave(vals);close();
  });
}

/* ================================================================
   TOAST
   ================================================================ */
let _tt;
function toast(msg,e=false){const r=document.getElementById('TR');r.innerHTML=`<div class="toast${e?' e':''}">${esc(msg)}</div>`;clearTimeout(_tt);_tt=setTimeout(()=>r.innerHTML='',2800)}

/* ================================================================
   BACKUP / RESTORE
   ================================================================ */
function doExport(){
  const d=new Date();
  const fname=`xuong-may-backup-${d.toISOString().slice(0,10)}.json`;
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname;a.click();
  toast('Đã xuất file backup');
}
function doImport(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.products&&!d.cutEntries){toast('File không hợp lệ',true);return}
      if(!confirm('Nhập dữ liệu sẽ ghi đè toàn bộ dữ liệu hiện tại. Tiếp tục?'))return;
      S={...defS(),...d};save();render();toast('Đã nhập dữ liệu thành công');
    }catch(err){toast('Lỗi đọc file: '+err.message,true)}
  };
  r.readAsText(file);
}

/* ================================================================
   BOOT
   ================================================================ */
document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>nav(t.dataset.tab)));
  window.addEventListener('scroll',()=>document.getElementById('HDR').classList.toggle('sc',window.scrollY>50),{passive:true});
  document.getElementById('btn_export').addEventListener('click',doExport);
  document.getElementById('btn_import').addEventListener('click',()=>document.getElementById('imp_file').click());
  document.getElementById('imp_file').addEventListener('change',e=>{doImport(e.target.files[0]);e.target.value=''});
  render();
});
</script>
